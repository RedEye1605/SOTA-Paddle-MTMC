# =============================================================================
# Camera links — physical topology.
# A link says "a person can plausibly walk from from_camera_id to to_camera_id
# in min_travel_seconds..max_travel_seconds, with transition_probability".
# If a pair is NOT linked, the global identity resolver MUST NOT auto-match
# identities across that pair, even if ReID similarity is high.
# =============================================================================

camera_links:
  - from_camera_id: CAM_01
    to_camera_id: CAM_02
    min_travel_seconds: 10
    max_travel_seconds: 90
    transition_probability: 0.85
    enabled: true
    notes: "After entering, customers walk to the showroom floor"

  - from_camera_id: CAM_01
    to_camera_id: CAM_03
    min_travel_seconds: 15
    max_travel_seconds: 120
    transition_probability: 0.70
    enabled: true
    notes: "Some customers go directly to the bike display"

  - from_camera_id: CAM_02
    to_camera_id: CAM_03
    min_travel_seconds: 20
    max_travel_seconds: 180
    transition_probability: 0.60
    enabled: true
    notes: "Walking between floor areas"

  - from_camera_id: CAM_02
    to_camera_id: CAM_04
    min_travel_seconds: 30
    max_travel_seconds: 300
    transition_probability: 0.40
    enabled: true
    notes: "VIP escalation, requires staff escort"

  - from_camera_id: CAM_03
    to_camera_id: CAM_05
    min_travel_seconds: 30
    max_travel_seconds: 180
    transition_probability: 0.30
    enabled: true
    notes: "Workshop drop-off"

  # --- explicit impossibilities ---
  - from_camera_id: CAM_01
    to_camera_id: CAM_04
    min_travel_seconds: 0
    max_travel_seconds: 0
    transition_probability: 0.0
    enabled: false
    notes: "Cannot reach VIP lounge without passing CAM_02 first"

  - from_camera_id: CAM_04
    to_camera_id: CAM_01
    min_travel_seconds: 0
    max_travel_seconds: 0
    transition_probability: 0.0
    enabled: false
    notes: "VIP lounge has no direct exit to entrance"
